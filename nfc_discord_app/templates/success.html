<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登録完了</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            background-color: #1e293b;
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 400px;
        }
        h1 { margin-top: 20px; font-weight: 800; color: #10b981; }
        p { color: #94a3b8; line-height: 1.5; }
        .icon { font-size: 72px; }
        .btn {
            background-color: #3b82f6;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            display: inline-block;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">✅</div>
        <h1>登録完了！</h1>
        <p><strong>{{ name }}</strong> さんのタグを登録しました。<br>このウィンドウは自動的に閉じます。</p>
        <button onclick="window.close()" class="btn">ウィンドウを閉じる</button>
    </div>
    <script>
        setTimeout(() => {
            window.close();
        }, 3000); // 3秒後に自動クローズ
    </script>
</body>
</html>
